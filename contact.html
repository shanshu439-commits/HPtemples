<!DOCTYPE html>  
<html>
<head>
    <title>Contact | Kangra Temples</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header>
    <h1>Contact Us</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Kangra</a>
    <a href="contact.html">Contact</a>
</nav>

<section>

<div>

    <!-- Owner Info -->
    <div>
        <h2>Website Owner</h2>
        <p><strong>Name:</strong> Shivanshu</p>
        <p><strong>Email:</strong> shivanshu@example.com</p>
        <p><strong>Phone:</strong> +91 98765 43210</p>
        <p><strong>Location:</strong> Kangra, Himachal Pradesh, India</p>
    </div>

    <!-- Contact Form -->
    <div>
        <h2>Send a Message</h2>

        <!-- IMPORTANT: action prevents redirect -->
        <form id="contactForm" action="javascript:void(0);">

            <label>Full Name</label><br>
            <input id="name" type="text" required><br><br>

            <label>Email</label><br>
            <input id="email" type="email" required><br><br>

            <label>Message</label><br>
            <textarea id="message" rows="5" required></textarea><br><br>

            <button id="submitBtn" type="submit">Send Message</button>

            <p id="formStatus"></p>

        </form>
    </div>

</div>

</section>

<footer>
&copy; 2026 Kangra Temples
</footer>

<script>
window.onload = function () {

  console.log("JS Loaded ✅");

  const form = document.getElementById("contactForm");
  const statusEl = document.getElementById("formStatus");
  const submitBtn = document.getElementById("submitBtn");

  form.onsubmit = async function (event) {
    event.preventDefault(); // STOP redirect

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();

    if (!name || !email || !message) {
      statusEl.textContent = "Please fill all fields.";
      return false;
    }

    submitBtn.disabled = true;
    statusEl.textContent = "Sending...";

    try {
      const response = await fetch("/api/contact", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, email, message })
      });

      if (response.ok) {
        statusEl.textContent = "✅ Your email is successfully sent!";
        form.reset();
      } else {
        statusEl.textContent = "❌ Failed to send message.";
      }

    } catch (error) {
      statusEl.textContent = "⚠️ Error sending message.";
    }

    submitBtn.disabled = false;
    return false;
  };
};
</script>

</body>
</html>
