<!DOCTYPE html>
<html>
<head>
  <title>Message Sent</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 90%;
    }

    .icon {
      font-size: 50px;
      color: #007bff;
      margin-bottom: 15px;
    }

    h2 {
      margin: 10px 0;
    }

    p {
      color: #666;
      font-size: 14px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .btn:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="icon">📧</div>
    <h2>Your Mail Sent Successfully!</h2>
    <p>
      Thank you for contacting us. We will get back to you soon.
    </p>

    <a href="index.html" class="btn">Go Home</a>
  </div>

</body>
</html>
